<script>

function renderLogin() {
document.getElementById('login-grid').innerHTML = equipe.map(f => `
<div class="login-card" onclick="entrar(${f.id})">
<img src="${f.foto || 'https://via.placeholder.com/100'}">
<div style="font-weight:bold; font-size:16px; margin-bottom:5px;">${f.nome}</div>
<span style="background:rgba(255,255,255,0.2); padding:3px 8px; border-radius:10px; color:white;">${f.cargo}</span>
</div>
`).join('');
}

function entrar(id) {
const f = equipe.find(x => x.id === id);
const p = prompt(`Digite a senha para ${f.nome}:`);

if(p === (f.senha || "5616")) {

idLogado = id;
nomeLogado = f.nome;

const loginScreen = document.getElementById('login-screen');
loginScreen.style.opacity = '0';
loginScreen.style.visibility = 'hidden';

setTimeout(() => {
loginScreen.style.display = 'none';
document.getElementById('app-container').style.display = 'flex';
}, 600);

document.getElementById('user-info').innerHTML = `
<img src="${f.foto || 'https://via.placeholder.com/100'}">
<h4>${f.nome}</h4>
<div class="badge">${f.cargo}</div>
`;

} else if(p !== null) {
alert("Senha Incorreta!");
}
}

function renderEstoque() {

if(estoque.length === 0) {

document.getElementById('selProd').innerHTML = `<option>Nenhum item cadastrado</option>`;

document.getElementById('corpo-estoque-lista').innerHTML = `
<tr><td colspan="3" style="text-align:center;">Estoque vazio</td></tr>
`;

document.getElementById('area-alertas').innerHTML = `
<div>Nenhum alerta</div>
`;

return;
}

document.getElementById('selProd').innerHTML =
estoque.map(i => `<option value="${i.id}">${i.nome} (Restam ${i.qtd})</option>`).join('');

const faltas = estoque.filter(i => i.qtd < 5);

document.getElementById('area-alertas').innerHTML =
faltas.length > 0
? `<div>⚠️ Faltando:<br>${faltas.map(f => `• ${f.nome} (${f.qtd})`).join('<br>')}</div>`
: `<div>✅ Estoque OK</div>`;

document.getElementById('corpo-estoque-lista').innerHTML =
estoque.map(i => `
<tr>
<td>${i.nome}</td>
<td>${i.qtd}</td>
<td>
<button onclick="ajustarQtd(${i.id}, -1)">-</button>
<button onclick="ajustarQtd(${i.id}, 1)">+</button>
<button onclick="removerItemEstoque(${i.id})">X</button>
</td>
</tr>
`).join('');
}

function enviarRelatorio() {

const faltas = estoque.filter(i => i.qtd < 5);

let msg = `🍕 *FECHAMENTO DE TURNO - POINT DA PIZZA*\n\n`;
msg += `*Responsável:* ${nomeLogado}\n`;
msg += `*Data:* ${new Date().toLocaleDateString()}\n\n`;

if(faltas.length > 0){
msg += `⚠️ *COMPRAS NECESSÁRIAS:*\n`;
faltas.forEach(f => {
msg += `- ${f.nome} (${f.qtd} ${f.unidade})\n`;
});
}else{
msg += `✅ Estoque OK\n`;
}

msg += `\nEnviado via App`;

const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
window.location.href = url;
}

function baixar() {

if(estoque.length === 0) return alert("Cadastre itens primeiro");

const id = document.getElementById('selProd').value;
const q = parseFloat(document.getElementById('qSai').value);

const i = estoque.find(x => x.id == id);

if(i){
i.qtd = Math.max(0, i.qtd - q);
db.ref('estoque_app').set(estoque);
document.getElementById('qSai').value = 1;
}
}

function salvarItem() {

const n = document.getElementById('iNome').value.trim();
const q = parseFloat(document.getElementById('iQtd').value);
const u = document.getElementById('iUnid').value;

if(!n || isNaN(q)) return alert("Preencha correto");

const existente = estoque.find(i => i.nome.toLowerCase() === n.toLowerCase());

if(existente){
existente.qtd += q;
}else{
estoque.push({id: Date.now(), nome: n, qtd: q, unidade: u});
}

db.ref('estoque_app').set(estoque);

document.getElementById('iNome').value = "";
document.getElementById('iQtd').value = "";
}

function renderListaEquipe() {
document.getElementById('lista-equipe-del').innerHTML =
equipe.map(f => `
<div>
${f.nome} - ${f.cargo}
<button onclick="removerFunc(${f.id})">X</button>
</div>
`).join('');
}

</script>
