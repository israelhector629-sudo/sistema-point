<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Point da Pizza - Sistema</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --primary: #e74c3c; --dark: #2c3e50; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); }

        /* HEADER COM RESPIRO */
        .header { background: var(--primary); color: white; padding: 45px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .header button { background: none; border: none; color: white; font-size: 1.8rem; padding: 10px; cursor: pointer; }

        /* TELA DE LOGIN/CADASTRO */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 30px;
        }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }
        .auth-box img { width: 100px; border-radius: 50%; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-acao { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .toggle-link { margin-top: 15px; color: var(--dark); cursor: pointer; font-size: 0.9rem; text-decoration: underline; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--dark); color: white; z-index: 999; transition: 0.3s; padding: 40px 20px; }
        .sidebar.open { left: 0; }
        .user-info { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #444; padding-bottom: 20px; }
        .user-pic { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; cursor: pointer; background: #eee; }
        
        /* CONTEÚDO */
        .card { background: white; padding: 20px; border-radius: 12px; margin: 15px; display: none; }
        .card.active { display: block; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <img src="logo.jpg.jpeg" onerror="this.src='https://via.placeholder.com/100'" alt="Logo">
            <h2 id="auth-title">Entrar no Sistema</h2><br>
            
            <div id="login-fields">
                <input type="email" id="email" placeholder="E-mail">
                <input type="password" id="senha" placeholder="Senha">
                <button class="btn-acao" onclick="fazerLogin()">ACESSAR</button>
                <p class="toggle-link" onclick="alternarTela(true)">Não tem conta? Cadastre-se</p>
            </div>

            <div id="register-fields" style="display:none;">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <input type="tel" id="reg-zap" placeholder="WhatsApp">
                <input type="email" id="reg-email" placeholder="E-mail">
                <input type="password" id="reg-senha" placeholder="Senha (6+ dígitos)">
                <button class="btn-acao" style="background: #27ae60;" onclick="fazerCadastro()">CRIAR CONTA</button>
                <p class="toggle-link" onclick="alternarTela(false)">Já tem conta? Faça Login</p>
            </div>
        </div>
    </div>

    <div class="header">
        <button onclick="menu()">☰</button>
        <h3>POINT DA PIZZA</h3>
        <div style="width:40px"></div>
    </div>

    <div class="sidebar" id="side">
        <div class="user-info">
            <img src="" id="user-img" class="user-pic" onclick="trocarFoto()">
            <h4 id="user-name">Carregando...</h4>
            <p id="user-status" style="font-size: 12px; opacity: 0.7;"></p>
        </div>
        <button class="btn-acao" style="background:none; text-align:left;" onclick="sair()">🚪 Sair do Sistema</button>
    </div>

    <div class="card active" id="estoque">
        <h3>📦 Seu Estoque está Seguro</h3>
        <p>Aqui continua o design que você já tem...</p>
    </div>

    <script>
       
<script>
  // CONFIGURAÇÃO REAL DO POINT DA PIZZA
  const firebaseConfig = {
    apiKey: "AIzaSyCg-jwfXSEWI6dXZqXpKlmbhY-zTaiXyyM",
    authDomain: "point-da-pizza-fc5d6.firebaseapp.com",
    databaseURL: "https://point-da-pizza-fc5d6.firebaseio.com",
    projectId: "point-da-pizza-fc5d6",
    storageBucket: "point-da-pizza-fc5d6.appspot.com",
    messagingSenderId: "658125716246",
    appId: "1:658125716246:web:ca129202695923984579d4ba"
  };

  // INICIALIZAÇÃO
  if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
  }
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Alternar entre Login e Cadastro
  function alternarTela(cadastrar) {
      document.getElementById('login-fields').style.display = cadastrar ? 'none' : 'block';
      document.getElementById('register-fields').style.display = cadastrar ? 'block' : 'none';
      document.getElementById('auth-title').innerText = cadastrar ? 'Criar Nova Conta' : 'Entrar no Sistema';
  }

  // Funções de Autenticação
  async function fazerCadastro() {
      const email = document.getElementById('reg-email').value;
      const senha = document.getElementById('reg-senha').value;
      const nome = document.getElementById('reg-nome').value;
      const zap = document.getElementById('reg-zap').value;

      if(!email || !senha || !nome) return alert("Preencha os campos obrigatórios!");

      try {
          const cred = await auth.createUserWithEmailAndPassword(email, senha);
          await db.collection('usuarios').doc(cred.user.uid).set({
              nome: nome,
              whatsapp: zap,
              foto: "https://via.placeholder.com/150",
              cargo: "Colaborador",
              isAdmin: false 
          });
          alert("Cadastro realizado com sucesso!");
      } catch (e) { alert("Erro no cadastro: " + e.message); }
  }

  async function fazerLogin() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      
      if(!email || !senha) return alert("Digite e-mail e senha!");

      try { 
          await auth.signInWithEmailAndPassword(email, senha); 
      } catch (e) { alert("Erro ao entrar: " + e.message); }
  }

  // Monitor de Login
  auth.onAuthStateChanged(user => {
      const screen = document.getElementById('auth-screen');
      if (user) {
          screen.style.display = 'none';
          atualizarPerfil(user.uid);
      } else {
          screen.style.display = 'flex';
      }
  });

  async function atualizarPerfil(uid) {
      const doc = await db.collection('usuarios').doc(uid).get();
      if (doc.exists) {
          const d = doc.data();
          document.getElementById('user-name').innerText = d.nome;
          document.getElementById('user-img').src = d.foto;
          document.getElementById('user-status').innerText = d.cargo;
      }
  }

  function menu() { document.getElementById('side').classList.toggle('open'); }
  function sair() { auth.signOut(); }

  function trocarFoto() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = e => {
          const reader = new FileReader();
          reader.onload = async () => {
              const base64 = reader.result;
              await db.collection('usuarios').doc(auth.currentUser.uid).update({ foto: base64 });
              document.getElementById('user-img').src = base64;
          };
          reader.readAsDataURL(e.target.files[0]);
      };
      input.click();
  }
</script>
        }
    </script>
</body>
</html>
