<div class="container">
    <div id="lista-estoque">
        </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">

    <div class="card-estoque">
        <h4><i class="fas fa-history"></i> Histórico de Movimentação</h4>
        <div id="lista-historico" style="margin-top: 15px; font-size: 13px; max-height: 200px; overflow-y: auto;">
            <p style="color: #999;">Nenhuma movimentação hoje...</p>
        </div>
    </div>
</div>

<script>
    // ... (firebaseConfig igual)

    // FUNÇÃO PARA ALTERAR ESTOQUE E GERAR HISTÓRICO
    function alterar(nome, qtd) {
        const usuario = document.getElementById('user-name').innerText;
        
        db.ref('estoque/' + nome).transaction(item => {
            if(item) {
                item.atual = Math.max(0, item.atual + qtd);
            }
            return item;
        }).then(() => {
            // SALVA NO HISTÓRICO
            db.ref('historico_estoque').push({
                item: nome,
                quantidade: qtd > 0 ? "+" + qtd : qtd,
                usuario: usuario,
                data: new Date().toLocaleTimeString('pt-BR')
            });
        });
    }

    // CARREGAR HISTÓRICO NA TELA
    function carregarHistorico() {
        db.ref('historico_estoque').limitToLast(10).on('value', snap => {
            const lista = document.getElementById('lista-historico');
            lista.innerHTML = "";
            const dados = snap.val();
            if(dados) {
                Object.values(dados).reverse().forEach(h => {
                    lista.innerHTML += `
                        <div style="padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;">
                            <span><b>${h.usuario}</b> ${h.quantidade} ${h.item}</span>
                            <span style="color: #999;">${h.data}</span>
                        </div>
                    `;
                });
            }
        });
    }

    // ADICIONE ESSA CHAMADA DENTRO DO auth.onAuthStateChanged
    // carregarHistorico();
</script>
