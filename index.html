<style>

/* ===================== ANIMAÇÕES ===================== */

.logo-top img {
  animation: pulseLogo 2.5s infinite;
}

@keyframes pulseLogo {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.logo-top span {
  opacity: 0;
  transform: translateX(-20px);
  animation: aparecerNome 1s ease forwards;
}

@keyframes aparecerNome {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.logo-top span {
  position: relative;
  overflow: hidden;
}

.logo-top span::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
  animation: brilhoNome 3s infinite;
}

@keyframes brilhoNome {
  100% { left: 100%; }
}

/* ===================== CORES ===================== */

:root {
  --primary: #e74c3c;
  --secondary: #1a252f;
  --success: #27ae60;
  --bg: #f4f7f8;
  --accent: #3498db;
}

* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--secondary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===================== LOGIN ===================== */

#login-screen {
  position: fixed;
  inset: 0;
  background: var(--secondary);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: white;
}

/* ===================== APP ===================== */

#app-container {
  display: none;
  flex-direction: column;
  height: 100vh;
  background: var(--bg);
}

.header {
  background: var(--primary);
  color: white;
  padding: 40px 15px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
}
