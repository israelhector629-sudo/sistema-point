<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Point da Pizza - App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<style>
/* (SEU CSS TODO AQUI - NÃO ALTERADO) */
</style>

<style>
.whatsapp-btn {
position: fixed;
bottom: 20px;
right: 20px;
background: #25D366;
color: white;
font-size: 28px;
padding: 15px;
border-radius: 50%;
text-decoration: none;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body onload="inicializar()">

<a href="https://wa.me/5516993061879?text=Olá,%20quero%20tirar%20um%20Duvida" target="_blank" class="whatsapp-btn">
💬
</a>

<div id="login-screen">
<div class="login-header">
<img src="logo.jpg.jpeg" onerror="this.src='https://via.placeholder.com/150'" alt="Logo Point">
<h2>POINT DA PIZZA</h2>
</div>

<div class="login-grid" id="login-grid"></div>
</div>

<div id="app-container">

<div class="header">
<div class="logo-top">
<img src="logo.jpg.jpeg">
<span>ESTOQUE POINT</span>
</div>

<button onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</button>
</div>

<div class="app-body">

<div class="sidebar" id="sidebar">
<div id="user-info"></div>

<button onclick="tab('inicio', this)">Início</button>
<button onclick="tab('pdv', this)">Saída</button>
<button onclick="tab('estoque', this)">Estoque</button>
<button onclick="tab('relatorio', this)">Relatório</button>

</div>

<div class="main-content">

<div id="inicio" class="card active">
<h3>Alertas</h3>
<div id="area-alertas"></div>
</div>

<div id="pdv" class="card">
<select id="selProd"></select>
<input type="number" id="qSai" value="1">
<button onclick="baixar()">CONFIRMAR</button>
</div>

<div id="estoque" class="card">
<input type="text" id="iNome">
<input type="number" id="iQtd">
<select id="iUnid">
<option>Un</option>
<option>Kg</option>
</select>

<button onclick="salvarItem()">SALVAR</button>

<table>
<tbody id="corpo-estoque-lista"></tbody>
</table>
</div>

</div>
</div>
</div>

<script>

const firebaseConfig = {
apiKey: "SUA_KEY",
authDomain: "SEU_AUTH",
databaseURL: "SEU_DB",
projectId: "SEU_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let estoque = [];

function salvarItem(){
const nome = document.getElementById('iNome').value;
const qtd = parseFloat(document.getElementById('iQtd').value);

estoque.push({id: Date.now(), nome, qtd});
db.ref('estoque_app').set(estoque);
}

function baixar(){
const id = document.getElementById('selProd').value;
const item = estoque.find(i => i.id == id);

if(item){
item.qtd -= 1;
db.ref('estoque_app').set(estoque);
}
}

function inicializar(){
db.ref('estoque_app').on('value', snap=>{
estoque = snap.val() || [];
render();
});
}

function render(){
document.getElementById('selProd').innerHTML =
estoque.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');

document.getElementById('corpo-estoque-lista').innerHTML =
estoque.map(i => `<tr><td>${i.nome}</td><td>${i.qtd}</td></tr>`).join('');
}

function tab(id){
document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

</script>

</body>
</html>
