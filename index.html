<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point da Pizza</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root { --primary:#e74c3c; --secondary:#1a252f; --success:#27ae60; }
body{font-family:Arial;margin:0;background:#f4f7f8}

/* ALERTAS ANIMADOS */
@keyframes alertaPulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231,76,60,0.6); }
  70% { transform: scale(1.02); box-shadow: 0 0 0 12px rgba(231,76,60,0); }
  100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231,76,60,0); }
}

.alerta-critico{
  animation:alertaPulse 1.5s infinite;
  background:#fff5f5;
  border-left:6px solid #e74c3c;
  padding:12px;
  border-radius:8px;
}

.alerta-ok{
  background:#f0fff4;
  border-left:6px solid #27ae60;
  padding:12px;
  border-radius:8px;
}

button{padding:10px;border:none;background:var(--primary);color:#fff;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<h2 style="padding:10px">🍕 Controle de Estoque</h2>

<div style="padding:10px">
<input id="nome" placeholder="Nome do item">
<input id="qtd" type="number" placeholder="Quantidade">
<button onclick="add()">Adicionar</button>
</div>

<div id="area-alertas" style="padding:10px"></div>

<ul id="lista"></ul>

<script>
let estoque = [];

function render(){

const lista = document.getElementById('lista');
lista.innerHTML = '';

estoque.forEach(i=>{
  lista.innerHTML += `<li>${i.nome} - ${i.qtd}</li>`;
});

const faltas = estoque.filter(i=>i.qtd < 5);

const area = document.getElementById('area-alertas');

area.innerHTML = faltas.length > 0
 ? `<div class="alerta-critico">
     ⚠️ Faltando:<br><br>
     ${faltas.map(f=>`• ${f.nome} (${f.qtd})`).join('<br>')}
   </div>`
 : `<div class="alerta-ok">✅ Estoque ok</div>`;
}

function add(){
const nome = document.getElementById('nome').value;
const qtd = parseFloat(document.getElementById('qtd').value);

if(!nome || isNaN(qtd)) return alert('Preencha tudo');

estoque.push({nome,qtd});
render();
}
</script>

</body>
</html>
