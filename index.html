<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Point da Pizza - App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<style>
/* LOGO TOPO ANIMADA */
.logo-top img {
  animation: pulseLogo 2.5s infinite;
}

@keyframes pulseLogo {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* NOME COM ENTRADA SUAVE */
.logo-top span {
  opacity: 0;
  transform: translateX(-20px);
  animation: aparecerNome 1s ease forwards;
}

@keyframes aparecerNome {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* EFEITO BRILHO NO NOME */
.logo-top span {
  position: relative;
  overflow: hidden;
}

.logo-top span::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.7), transparent);
  animation: brilhoNome 3s infinite;
}

@keyframes brilhoNome {
  100% { left: 100%; }
}

:root {
  --primary: #e74c3c;
  --secondary: #1a252f;
  --success: #27ae60;
  --bg: #f4f7f8;
  --accent: #3498db;
}

* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--secondary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* === ANIMAÇÕES GERAIS === */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
  70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
  100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
}

@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* LOGIN */
#login-screen {
  position: fixed;
  inset: 0;
  background: var(--secondary);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  padding: 20px;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

.login-header {
  text-align: center;
  margin-bottom: 20px;
  animation: fadeIn 0.8s ease-out;
}

.login-header img {
  width: 150px !important;
  height: 150px !important;
  border-radius: 50%;
  border: 4px solid white;
  margin-bottom: 10px;
  object-fit: cover;
  background: white;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  animation: pulse 2.5s infinite;
}

/* RESTO DO CÓDIGO CONTINUA EXATAMENTE IGUAL... */
</style>

<style>
.whatsapp-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  font-size: 28px;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>

</head>

<body onload="inicializar()">

<a href="https://wa.me/5516993061879?text=Olá,%20quero%20tirar%20um%20Duvida" target="_blank" class="whatsapp-btn">
  💬
</a>

<div id="login-screen">
  <div class="login-header">
    <img src="logo.jpg.jpeg" onerror="this.src='https://via.placeholder.com/150'" alt="Logo Point">
    <h2 style="margin-top:10px; letter-spacing: 2px;">POINT DA PIZZA</h2>
  </div>

  <div class="login-grid" id="login-grid"></div>
</div>

</html>
