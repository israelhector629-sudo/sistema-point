<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point da Pizza - App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<style>
:root {
  --primary:#e74c3c;
  --secondary:#1a252f;
  --success:#27ae60;
}
body{margin:0;font-family:Arial;background:var(--secondary)}

#login-screen{
  position:fixed;inset:0;background:#1a252f;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.login-card{
  background:#ffffff20;padding:10px;margin:5px;border-radius:10px;cursor:pointer;text-align:center;
}

#app-container{display:none;height:100vh;background:#f4f7f8}
.header{background:var(--primary);color:#fff;padding:10px}

.card{display:none;padding:15px}
.card.active{display:block}

.btn{padding:10px;border:none;border-radius:5px;color:#fff;cursor:pointer}

</style>
</head>

<body onload="init()">

<div id="login-screen">
  <h2>POINT DA PIZZA</h2>
  <div id="login"></div>
</div>

<div id="app-container">
  <div class="header">ESTOQUE</div>

  <div class="card active" id="estoque">
    <h3>Estoque</h3>
    <input id="nome" placeholder="Item">
    <input id="qtd" type="number" placeholder="Qtd">
    <button class="btn" style="background:var(--primary)" onclick="addItem()">Salvar</button>

    <ul id="lista"></ul>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCg-jwfXSEWI6dXZqXpKlmbhY-zTaiXyyM",
  databaseURL: "https://point-da-pizza-fc5d6-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let estoque=[];
let equipe=[{id:1,nome:"Israel",senha:"5616"}];

function init(){
  renderLogin();

  db.ref("estoque").on("value",snap=>{
    estoque=snap.val()||[];
    renderLista();
  });
}

function renderLogin(){
  document.getElementById("login").innerHTML = equipe.map(f=>`
    <div class="login-card" onclick="login(${f.id})">
      ${f.nome}
    </div>
  `).join("");
}

function login(id){
  let f=equipe.find(x=>x.id===id);
  let s=prompt("Senha:");
  if(s===f.senha){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app-container").style.display="block";
  }else alert("Senha errada");
}

function addItem(){
  let nome=document.getElementById("nome").value;
  let qtd=parseFloat(document.getElementById("qtd").value);

  if(!nome||isNaN(qtd)) return alert("Preencha");

  estoque.push({id:Date.now(),nome,qtd});
  db.ref("estoque").set(estoque);

  document.getElementById("nome").value="";
  document.getElementById("qtd").value="";
}

function renderLista(){
  document.getElementById("lista").innerHTML = estoque.map(i=>`
    <li>
      ${i.nome} - ${i.qtd}
      <button onclick="remover(${i.id})">X</button>
    </li>
  `).join("");
}

function remover(id){
  estoque = estoque.filter(i=>i.id!==id);
  db.ref("estoque").set(estoque);
}
</script>

</body>
</html>
