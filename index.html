<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Point da Pizza - Sistema</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #e74c3c; --dark: #2c3e50; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); }
        .header { background: var(--primary); color: white; padding: 45px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .header button { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-box { width: 100%; max-width: 350px; text-align: center; }
        .auth-box img { width: 100px; border-radius: 50%; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn-acao { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: var(--dark); color: white; z-index: 999; transition: 0.3s; padding: 40px 20px; }
        .sidebar.open { left: 0; }
        .user-info { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #444; padding-bottom: 20px; }
        .user-pic { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; cursor: pointer; background: #eee; }
        .card { background: white; padding: 20px; border-radius: 12px; margin: 15px; display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <img src="logo.jpg.jpeg" onerror="this.src='https://via.placeholder.com/100'">
            <h2 id="auth-title">Entrar no Sistema</h2><br>
            <div id="login-fields">
                <input type="email" id="email" placeholder="E-mail">
                <input type="password" id="senha" placeholder="Senha">
                <button class="btn-acao" onclick="fazerLogin()">ACESSAR</button>
                <p style="margin-top:15px; text-decoration:underline; cursor:pointer" onclick="alternar(true)">Cadastrar novo funcionário</p>
            </div>
            <div id="register-fields" style="display:none;">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <input type="email" id="reg-email" placeholder="E-mail">
                <input type="password" id="reg-senha" placeholder="Senha">
                <button class="btn-acao" style="background:#27ae60" onclick="fazerCadastro()">CRIAR CONTA</button>
                <p style="margin-top:15px; text-decoration:underline; cursor:pointer" onclick="alternar(false)">Voltar para Login</p>
            </div>
        </div>
    </div>

    <div id="app-content" style="display:none">
        <div class="header">
            <button onclick="menu()">☰</button>
            <h3>POINT DA PIZZA</h3>
            <div style="width:40px"></div>
        </div>
        <div class="sidebar" id="side">
            <div class="user-info">
                <img src="" id="user-img" class="user-pic" onclick="trocarFoto()">
                <h4 id="user-name">Carregando...</h4>
                <p id="user-status" style="font-size: 12px; opacity: 0.7;"></p>
            </div>
            <button class="btn-acao" style="background:none" onclick="sair()">🚪 Sair</button>
        </div>
        <div class="card" style="display:block">
            <h3>📦 Sistema Online</h3>
            <p>Seja bem-vindo ao controle do Point da Pizza!</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCg-jwfXSEWI6dXZqXpKlmbhY-zTaiXyyM",
            authDomain: "point-da-pizza-fc5d6.firebaseapp.com",
            databaseURL: "https://point-da-pizza-fc5d6-default-rtdb.firebaseio.com",
            projectId: "point-da-pizza-fc5d6",
            storageBucket: "point-da-pizza-fc5d6.appspot.com",
            messagingSenderId: "658125716246",
            appId: "1:658125716246:web:ca129202695923984579d4ba"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function alternar(cad) {
            document.getElementById('login-fields').style.display = cad ? 'none' : 'block';
            document.getElementById('register-fields').style.display = cad ? 'block' : 'none';
        }

        async function fazerCadastro() {
            const email = document.getElementById('reg-email').value;
            const senha = document.getElementById('reg-senha').value;
            const nome = document.getElementById('reg-nome').value;
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, senha);
                await db.ref('usuarios/' + cred.user.uid).set({
                    nome: nome,
                    foto: "https://via.placeholder.com/150",
                    cargo: "Colaborador",
                    isAdmin: false
                });
                alert("Funcionário cadastrado!");
            } catch (e) { alert(e.message); }
        }

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            try { await auth.signInWithEmailAndPassword(email, senha); } catch (e) { alert(e.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                db.ref('usuarios/' + user.uid).on('value', snap => {
                    const d = snap.val();
                    if(d) {
                        document.getElementById('user-name').innerText = d.nome;
                        document.getElementById('user-img').src = d.foto;
                        document.getElementById('user-status').innerText = d.cargo;
                    }
                });
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            }
        });

        function menu() { document.getElementById('side').classList.toggle('open'); }
        function sair() { auth.signOut(); }
        
        function trocarFoto() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = async () => {
                    await db.ref('usuarios/' + auth.currentUser.uid).update({ foto: reader.result });
                    alert("Foto atualizada!");
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }
    </script>
</body>
</html>
